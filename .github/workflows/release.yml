name: Release

# Builds installers on Windows, macOS, and Linux. Pushing a version tag (v*)
# also attaches them to the matching GitHub Release. workflow_dispatch builds
# the same artifacts on demand (without touching a release) so multi-platform
# builds can be verified.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# The default GITHUB_TOKEN is read-only in this repo; the release-attach step
# needs write access to create/update the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build installers
        run: npm run dist
        env:
          # No code-signing certificate — build unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload installers (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
          if-no-files-found: ignore
      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
