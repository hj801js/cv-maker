<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5570ff"/>
      <stop offset="1" stop-color="#3140c4"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2b3a96"/>
      <stop offset="1" stop-color="#4258d6"/>
    </linearGradient>
    <clipPath id="card">
      <rect x="58" y="46" width="140" height="164" rx="16"/>
    </clipPath>
  </defs>

  <!-- rounded app tile -->
  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#bg)"/>

  <!-- document card -->
  <g clip-path="url(#card)">
    <rect x="58" y="46" width="140" height="164" fill="#ffffff"/>
    <!-- coloured header band with the "CV" wordmark -->
    <rect x="58" y="46" width="140" height="56" fill="url(#band)"/>
    <text x="128" y="88" text-anchor="middle" fill="#ffffff"
          font-family="Arial, Helvetica, sans-serif" font-weight="800"
          font-size="36" letter-spacing="3">CV</text>
    <!-- "MAKER" on the card body -->
    <text x="128" y="150" text-anchor="middle" fill="#2f3fc4"
          font-family="Arial, Helvetica, sans-serif" font-weight="800"
          font-size="26" letter-spacing="2">MAKER</text>
    <!-- faint body lines for the document feel -->
    <g fill="#cdd6f0">
      <rect x="83" y="172" width="90" height="7" rx="3.5"/>
      <rect x="96" y="188" width="64" height="7" rx="3.5"/>
    </g>
  </g>
</svg>
